<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ことばの力テスト(プロトタイプ)</title>
<style>
  :root{
    --ink:#1c2430; --sub:#5a6472; --faint:#8b94a3;
    --paper:#ffffff; --bg:#eef0f3; --line:#dde1e7; --soft:#f6f7f9;
    --main:#155e63; --main-weak:#e3efef;
    --a:#9a6b15; --a-weak:#f6eedc;
    --c:#5b6c8f; --c-weak:#e8ecf4;
    --ok:#2e7d4f; --ng:#b3433f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 14px 60px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 16px rgba(28,36,48,.06);padding:34px 38px;}
  h1{font-size:22px;margin-bottom:4px;}
  h2{font-size:17px;margin-bottom:12px;}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--faint);letter-spacing:.18em;margin-bottom:10px;}
  p.lead{font-size:14px;color:var(--sub);margin-bottom:10px;}
  .btn{display:inline-block;border:none;border-radius:8px;background:var(--main);color:#fff;font-size:16px;font-weight:700;
       padding:13px 34px;cursor:pointer;font-family:inherit;}
  .btn:disabled{background:#b8c2c3;cursor:default;}
  .btn.ghost{background:var(--soft);color:var(--sub);border:1px solid var(--line);font-weight:500;}
  .btn.big{font-size:19px;padding:18px 30px;min-width:170px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;}
  .field input[type=text], .field input[type=number], .field select{width:100%;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font-family:inherit;}
  .progress{height:6px;background:var(--soft);border-radius:3px;margin-bottom:26px;overflow:hidden;}
  .progress div{height:100%;background:var(--main);border-radius:3px;transition:width .25s;}
  .pcount{font-size:11px;color:var(--faint);text-align:right;margin:-20px 0 14px;}
  .stim{font-size:42px;font-weight:800;text-align:center;margin:34px 0 30px;letter-spacing:.04em;line-height:1.4;}
  .stim.small{font-size:26px;font-weight:600;}
  .stim.sentence{font-size:21px;font-weight:600;text-align:left;}
  .opts{display:grid;grid-template-columns:1fr;gap:10px;max-width:560px;margin:0 auto;}
  .opt{border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:13px 18px;font-size:16px;
       cursor:pointer;text-align:left;font-family:inherit;line-height:1.5;}
  .opt:hover{border-color:var(--main);}
  .opt.sel-ok{border-color:var(--ok);background:#edf7f1;}
  .opt.sel-ng{border-color:var(--ng);background:#fbeeed;}
  .yn{display:flex;gap:18px;justify-content:center;margin-top:8px;}
  .fb{text-align:center;font-size:14px;font-weight:700;margin-top:16px;min-height:24px;}
  .fb.ok{color:var(--ok);} .fb.ng{color:var(--ng);}
  .note{font-size:12px;color:var(--faint);margin-top:14px;}
  .kvs{font-size:13px;color:var(--sub);margin:10px 0;}
  .blank{display:inline-block;border-bottom:2.5px solid var(--main);font-weight:800;color:var(--main);padding:0 3px;letter-spacing:.1em;}
  .hintbox{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:14px;color:var(--sub);margin:14px 0;}
  .boxes{display:flex;gap:6px;justify-content:center;margin:18px 0 10px;}
  .bx{width:46px;height:54px;border:2px solid var(--line);border-radius:7px;display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:800;background:var(--paper);}
  .bx.fixed{background:var(--main-weak);border-color:var(--main);color:var(--main);}
  .inputline{display:flex;gap:10px;justify-content:center;margin-top:8px;}
  .inputline input{font-size:22px;padding:9px 14px;border:2px solid var(--main);border-radius:8px;width:230px;text-align:center;font-family:inherit;}
  .pal{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;max-width:560px;margin:14px auto 0;}
  .pal button{font-size:17px;padding:8px 0;border:1px solid var(--line);border-radius:6px;background:var(--paper);cursor:pointer;font-family:inherit;}
  .pal button.wide{grid-column:span 2;background:var(--soft);}
  .timerbar{height:4px;background:var(--soft);border-radius:2px;margin-bottom:8px;overflow:hidden;}
  .timerbar div{height:100%;background:var(--a);width:100%;}
  .center{text-align:center;}
  .bigdot{width:130px;height:130px;border-radius:50%;background:var(--main);margin:40px auto;cursor:pointer;box-shadow:0 4px 18px rgba(21,94,99,.4);}
  /* report */
  .rep-big{font-size:46px;font-weight:900;line-height:1.1;}
  .rep-big small{font-size:20px;font-weight:700;}
  .rep-name{font-size:14px;font-weight:700;color:var(--main);}
  .rep-ci{font-size:12px;color:var(--sub);margin-top:4px;}
  .tierrow{display:grid;grid-template-columns:118px 1fr 140px;gap:12px;align-items:center;margin-bottom:12px;}
  .tname{font-size:12.5px;font-weight:700;text-align:right;}
  .tname small{display:block;font-weight:400;font-size:10px;color:var(--faint);}
  .tbar{height:30px;border-radius:4px;display:flex;align-items:center;padding-left:12px;font-size:13px;font-weight:700;color:#fff;min-width:60px;}
  .tnum{font-size:11px;color:var(--sub);}
  .badge{display:inline-block;font-size:10px;font-weight:700;border-radius:3px;padding:1px 6px;}
  .badge.rec{background:var(--main);color:#fff;}
  .badge.est{background:var(--soft);color:var(--sub);border:1px solid var(--line);}
  .gaps{display:flex;gap:10px;margin:12px 0;}
  .gap{flex:1;background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:9px 12px;}
  .gap .g1{font-size:10.5px;color:var(--faint);}
  .gap .g2{font-size:19px;font-weight:900;}
  .quality{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin-top:6px;}
  .secline{border:none;border-top:1px dashed var(--line);margin:24px 0;}
  details{margin-top:18px;font-size:12px;color:var(--sub);}
  details pre{background:var(--soft);padding:12px;border-radius:7px;overflow:auto;font-size:11px;line-height:1.5;margin-top:8px;}
  .mockband{position:fixed;top:14px;right:-46px;transform:rotate(33deg);background:#b3433f;color:#fff;font-size:10px;
        padding:3px 50px;letter-spacing:.12em;z-index:50;pointer-events:none;}
  .kbd{display:inline-block;font-size:10px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);
       border-bottom-width:2.5px;border-radius:4px;padding:0 7px;margin-left:9px;vertical-align:2px;line-height:1.6;}
  .btn .kbd{background:rgba(255,255,255,.92);}
  .opt .kbd{margin-left:0;margin-right:9px;}
  @media (max-width:600px){
    .card{padding:24px 18px;}
    .stim{font-size:34px;}
    .tierrow{grid-template-columns:92px 1fr 110px;}
  }
</style>
</head>

function normPrior(grid, mu, sd){ return grid.map(t=>Math.exp(-0.5*((t-mu)/sd)**2)); }

// 取りこぼし(lapse): 見た語でも一定率で「ない」と答える慎重さ。実測6.4%→0.10で較正(18ログ再採点)。慎重な人のC過小を補正。
const P1_LAPSE=0.10;
const MIN_P1_RT=250;   // これ未満(ms)の反応は誤クリックとして採点から除外
// P1: 2次元EAP(c_C と 偽語誤反応率 g)。実在語の上限を(1-λ)に圧縮=取りこぼし吸収。
function eapP1(items, priorMu, priorSd){
  const gGrid=[0.02,0.05,0.10,0.15,0.20,0.30,0.40];
  const gPrior=[0.30,0.30,0.18,0.10,0.06,0.04,0.02];
  const cPrior=normPrior(GRID,priorMu,priorSd);
  let post=[]; let Z=0;
  for(let i=0;i<GRID.length;i++){ post.push([]);
    for(let j=0;j<gGrid.length;j++){
      let L=cPrior[i]*gPrior[j];
      for(const it of items){
        if(it.fast) continue;                                  // 誤クリック(超高速反応)は採点に使わない
        const pYes = it.real ? (1-P1_LAPSE)*sig(GRID[i]-it.b) : gGrid[j];
        L *= it.resp ? pYes : (1-pYes);
        if(L<1e-300){L=1e-300;}
      }
      post[i].push(L); Z+=L;
    }}
  let mC=0,mG=0;
  for(let i=0;i<GRID.length;i++)for(let j=0;j<gGrid.length;j++){const w=post[i][j]/Z; mC+=w*GRID[i]; mG+=w*gGrid[j];}
  let v=0; for(let i=0;i<GRID.length;i++)for(let j=0;j<gGrid.length;j++){const w=post[i][j]/Z; v+=w*(GRID[i]-mC)**2;}
  return {c:mC, se:Math.sqrt(v), g:mG};
}

// 1次元EAP(4択floor / 想起0)
function eap1d(items, priorMu, priorSd){
  const prior=normPrior(GRID,priorMu,priorSd);
  const post=GRID.map((t,i)=>{
    let L=prior[i];
    for(const it of items){
      const base=sig(t-it.b);
      const hi=1-(it.slip||0);                 // 上限漸近(=分かっていてもミスする率 slip を吸収)
      const p=it.floor + (hi-it.floor)*base;
      L *= it.correct ? p : (1-p);
      if(L<1e-300)L=1e-300;
    }
    return L;
  });
  const Z=post.reduce((a,b)=>a+b,0);
  let m=0; post.forEach((L,i)=>m+=L/Z*GRID[i]);
  let v=0; post.forEach((L,i)=>v+=L/Z*(GRID[i]-m)**2);
  return {c:m, se:Math.sqrt(v)};
}

function vocabCountHard(c, floor){
  let s=0; for(const bin of DATA.daicho.bins){ if(bin.b>floor) s += bin.n * sig(c - bin.b); }

}

/* 難易度の層化ランダム抽出(banに入った語は避ける。足りなければ再利用) */
function stratSample(arr,n,ban){
  const sorted=[...arr].sort((a,b)=>a.b-b.b);
  const picked=[];
  for(let k=0;k<n;k++){
    const lo=Math.floor(k*sorted.length/n), hi=Math.max(Math.floor((k+1)*sorted.length/n),lo+1);
    const bucket=sorted.slice(lo,hi).filter(x=>!picked.includes(x));
    let cand=bucket.filter(x=>!ban.has(x.w));
    if(!cand.length) cand=bucket;
    if(cand.length) picked.push(cand[Math.floor(Math.random()*cand.length)]);
  }
  return picked;
}

const ROMA={a:'あ',i:'い',u:'う',e:'え',o:'お',ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',sa:'さ',si:'し',shi:'し',su:'す',se:'せ',so:'そ',ta:'た',ti:'ち',chi:'ち',tu:'つ',tsu:'つ',te:'て',to:'と',na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',ha:'は',hi:'ひ',hu:'ふ',fu:'ふ',he:'へ',ho:'ほ',ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',ya:'や',yu:'ゆ',yo:'よ',ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',wa:'わ',wo:'を',ga:'が',gi:'ぎ',gu:'ぐ',ge:'げ',go:'ご',za:'ざ',zi:'じ',ji:'じ',zu:'ず',ze:'ぜ',zo:'ぞ',da:'だ',di:'ぢ',du:'づ',de:'で',do:'ど',ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',fa:'ふぁ',fi:'ふぃ',fe:'ふぇ',fo:'ふぉ',kya:'きゃ',kyu:'きゅ',kyo:'きょ',sha:'しゃ',shu:'しゅ',sho:'しょ',sya:'しゃ',syu:'しゅ',syo:'しょ',cha:'ちゃ',chu:'ちゅ',cho:'ちょ',tya:'ちゃ',tyu:'ちゅ',tyo:'ちょ',nya:'にゃ',nyu:'にゅ',nyo:'にょ',hya:'ひゃ',hyu:'ひゅ',hyo:'ひょ',mya:'みゃ',myu:'みゅ',myo:'みょ',rya:'りゃ',ryu:'りゅ',ryo:'りょ',gya:'ぎゃ',gyu:'ぎゅ',gyo:'ぎょ',ja:'じゃ',ju:'じゅ',jo:'じょ',jya:'じゃ',jyu:'じゅ',jyo:'じょ',bya:'びゃ',byu:'びゅ',byo:'びょ',pya:'ぴゃ',pyu:'ぴゅ',pyo:'ぴょ',xa:'ぁ',xi:'ぃ',xu:'ぅ',xe:'ぇ',xo:'ぉ',xya:'ゃ',xyu:'ゅ',xyo:'ょ',xtu:'っ',ltu:'っ',la:'ぁ',li:'ぃ',lu:'ぅ',le:'ぇ',lo:'ぉ',lya:'ゃ',lyu:'ゅ',lyo:'ょ',nn:'ん'};
function makeRomaji(onChange, maxLen, prefix){
  let kana=prefix, pend='';
  const tryFlush=()=>{
    let prog=true;
    while(prog){
      prog=false;
      if(kana.length>=maxLen) break;
      if(pend.startsWith('nn')){kana+='ん';pend=pend.slice(2);prog=true;continue;}
      if(pend.length>=2 && pend[0]==='n' && !'aiueoyn'.includes(pend[1])){kana+='ん';pend=pend.slice(1);prog=true;continue;}
      if(pend.length>=2 && pend[0]===pend[1] && !'aiueon'.includes(pend[0])){kana+='っ';pend=pend.slice(1);prog=true;continue;}
      for(const L of [3,2,1]){
        if(pend.length>=L && ROMA[pend.slice(0,L)]!==undefined){
          const k=ROMA[pend.slice(0,L)];
          if(kana.length+k.length<=maxLen){kana+=k;}
          pend=pend.slice(L); prog=true; break;
        }
      }
      if(!prog && pend.length>=4){pend=pend.slice(1);prog=true;}
    }
    onChange(kana,pend);
  };
  return {
    key(e){
      const k=e.key;
      if(k==='Backspace'){ if(pend)pend=pend.slice(0,-1); else if(kana.length>prefix.length)kana=kana.slice(0,-1); onChange(kana,pend); return true; }
      if(/^[a-zA-Z]$/.test(k)){ pend+=k.toLowerCase(); tryFlush(); return true; }
      if(k==='-'||k==='ー'){ if(kana.length<maxLen){kana+='ー'; onChange(kana,pend);} return true; }
      return false;
    },
    finalize(){ if(pend==='n'&&kana.length<maxLen){kana+='ん';pend='';onChange(kana,pend);} return kana; },
    pal(ch){ if(kana.length<maxLen){kana+=ch; onChange(kana,pend);} },
    del(){ if(kana.length>prefix.length){kana=kana.slice(0,-1); onChange(kana,pend);} },
    value(){ return kana; }
  };
}

/* ---------- パート1 本番(適応型: 正解→難化 / 不正解→易化) ---------- */
let p1Pool=[], p1Pseudo=[], p1Seq=[], p1Idx=0, p1T0=0, p1ItemT0=0, p1cEst=0;
const P1_REAL_N=80;
function ageStartC(){
  const a=parseInt(S.meta.age,10);
  if(isNaN(a)) return -0.6;
  if(a>=18) return -0.6;    // 大人
  if(a>=15) return -1.2;    // 高校
  if(a>=12) return -1.5;    // 中学
  if(a>=11) return -1.7;    // 小6
  return -1.8;              // 小5
}
function startP1(){
  // 全実語プールから現在の推定値に近い語を都度えらぶ真の適応出題。短縮版は実語40+偽語14。
  const realN = S.short? 40 : P1_REAL_N;
  const psN   = S.short? 18 : 28;   // 短縮版の偽語をやや増やしg(誤反応率)推定を安定化
  const h=loadHist();
  const used=new Set((h.used&&h.used.p1)||[]);
  const usedPs=new Set((h.used&&h.used.ps)||[]);
  const usedP3r=new Set((h.used&&h.used.p3r)||[]);
  // P3想起の候補語を確保しP1・P2から締め出す(ネタバレ防止)。短縮版はP3が無いので確保しない。
  if(S.short){ S._p3reserve=[]; }
  else {
    let recallCand=DATA.bank.p3_recall.filter(x=>!usedP3r.has(x.answer));
    if(recallCand.length<18) recallCand=DATA.bank.p3_recall;
    S._p3reserve=stratSample(recallCand.map(x=>({...x,w:x.answer,used:false})), Math.min(40,recallCand.length), new Set());
  }
  const banReading=new Set((S._p3reserve||[]).map(x=>x.answer));
  const all=DATA.bank.p1_real.filter(x=>!banReading.has(x.r));
  let pool=all.filter(x=>!used.has(x.w));
  if(pool.length < realN+30) pool=all;
  p1Pool=pool.map(x=>({w:x.w,b:x.b,used:false}));
  const psFresh=DATA.bank.p1_pseudo.filter(x=>!usedPs.has(x.w));
  p1Pseudo=shuffle(psFresh.length>=psN? psFresh : DATA.bank.p1_pseudo).slice(0,psN);
  p1Seq=shuffle([...Array(realN).fill('R'),...Array(p1Pseudo.length).fill('P')]);
  p1Idx=0; p1T0=now(); p1cEst=ageStartC();
  p1Next();
}
function p1Pick(){
  const cand=p1Pool.filter(x=>!x.used);
  if(!cand.length)return null;
  cand.sort((a,b)=>Math.abs(a.b-p1cEst)-Math.abs(b.b-p1cEst));
  const top=cand.slice(0,Math.min(8,cand.length));   // 近傍8語からランダム(変動+反復回避。プールが大きいほど毎回ちがう語に)
  const it=top[Math.floor(Math.random()*top.length)];
  it.used=true;
  return {w:it.w,b:it.b,real:true};
}
function p1Next(){
  if(p1Idx>=p1Seq.length || (now()-p1T0)>10*60*1000){ S.partDur.p1=(now()-p1T0)/1000; showPartIntro(2); return; }
  let it=null;
  if(p1Seq[p1Idx]==='P'){
    const p=p1Pseudo.pop();
    it = p ? {w:p.w,b:0,real:false} : p1Pick();
  }else{
    it = p1Pick();
    if(!it){ const p=p1Pseudo.pop(); it = p ? {w:p.w,b:0,real:false} : null; }
  }
  if(!it){ S.partDur.p1=(now()-p1T0)/1000; showPartIntro(2); return; }
  scr().innerHTML=`
    <div class="progress"><div style="width:${(p1Idx/p1Seq.length*100)}%"></div></div>
    <div class="pcount">${p1Idx+1} / ${p1Seq.length}</div>
    <p class="lead center" style="margin-bottom:0;">このことば、見たことがある?</p>
    <div class="stim">${it.w}</div>
    <div class="yn"><button class="btn big" id="y">見たことがある ${kbd('1')}</button><button class="btn big ghost" id="n">ない・わからない ${kbd('2')}</button></div>`;
  setKeys(ynKeys('#y','#n'));
  p1ItemT0=now();
  let lk=false;
  const answer=resp=>{
    if(lk)return; lk=true;
    const rt=Math.round(now()-p1ItemT0);
    const fast = rt<MIN_P1_RT;                  // 誤クリック判定(人間の反応下限未満)
    const rec={w:it.w,b:+it.b.toFixed(2),real:it.real,resp,rt}; if(fast) rec.fast=true;
    S.p1.push(rec);
    if(it.real && !fast){
      p1cEst += resp ? 0.25 : -0.35;            // 正解(ある)で難化、不正解で易化(誤クリックでは動かさない)
      const nr=S.p1.filter(x=>x.real&&!x.fast).length;
      if(nr>0 && nr%6===0){ const e=eapP1(S.p1, ageStartC(), 1.6); p1cEst=e.c; }  // 定期的に厳密推定へ再アンカー
    }
    p1Idx++; p1Next();
  };
  $('#y').onclick=()=>answer(true); $('#n').onclick=()=>answer(false);
}

/* ---------- パート2 本番(SMC: 選択肢を1つずつ提示・もどれない・数は非公開) ---------- */
let p2Pool=[], p2T0=0, p2Est={c:0,se:2};
const P2_MAX=50, P2_MIN=24, P2_SE_STOP=0.28, P2_FLOOR=0.10, P2_SLIP=0.10;  // slip=分かっていても取りこぼす率(9セッション再採点で較正)
function startP2(){
  // P1から c_C を仮推定 → 出題開始点に使う(推定には使わない)
  const e1=eapP1(S.p1, 0.5, 1.5);
  S.est._p1quick=e1;
  const h=loadHist();
  const usedP2=new Set((h.used&&h.used.p2)||[]);
  const pool=DATA.bank.p2.slice();   // P3予約はP1のみで締め出す(易問P2が枯れるのを防ぐ。意味→想起の軽微なヒントは許容)
  const fresh=pool.filter(x=>!usedP2.has(x.w));
  p2Pool=(fresh.length>=30? fresh : pool).map(x=>({...x,used:false}));
  p2T0=now();
  p2Est={c: e1.c-0.5, se:2};   // 意味は見たより低い→「見た−0.5」から開始(出だしを下げる)
  p2Next();
}
/* 同義の定義文を持つ語クラスタ: 同一セッションで両方は出さない(相互ヒント防止) */
const SYN_GROUPS=[["一瞥","瞥見","俯瞰"],["跋扈","跳梁","横行"],["磊落","闊達","鷹揚","浩然"],["杞憂","憂慮","危惧"],
  ["ユートピア","ディストピア"],["ペシミズム","オプティミズム"],["蛇足","画竜点睛"],["背水の陣","四面楚歌"],
  ["油断","警戒"],["倹約","浪費"],["ことごとく","あらかた"],["温故知新","旧態依然"]];
function p2Select(){
  const shown=new Set(S.p2.map(x=>x.w));
  const banned=new Set();
  for(const g of SYN_GROUPS){ if(g.some(w=>shown.has(w))) g.forEach(w=>banned.add(w)); }
  const cand=p2Pool.filter(x=>!x.used && !banned.has(x.w));
  if(!cand.length) return null;
  const target=p2Est.c+0.1;   // 実力ちょうど寄り(以前の+0.3=やや難しめを是正)
  cand.sort((a,b)=>Math.abs(a.b-target)-Math.abs(b.b-target));
  const top=cand.slice(0,Math.min(3,cand.length));
  return top[Math.floor(Math.random()*top.length)];
}
function p2Next(){
  const elapsed=now()-p2T0;
  const answered=S.p2.length;
  const pmax=S.short?24:P2_MAX, pmin=S.short?12:P2_MIN;
  const goNext=()=>{ S.partDur.p2=(now()-p2T0)/1000; if(S.short) finish(); else showPartIntro(3); };  // 短縮版はP3を飛ばして採点
  if(answered>=pmax || elapsed>15*60*1000 || (answered>=pmin && p2Est.se<P2_SE_STOP)){ goNext(); return; }
  const it=p2Select();
  if(!it){ goNext(); return; }
  it.used=true;
  const dIdx=it.opts.map((_,i)=>i).filter(i=>i!==it.ans);             // 実在する選択肢のみ
  const nOpt=Math.min(2+Math.floor(Math.random()*3), it.opts.length); // 2〜4(非公開)・選択肢数を超えない
  const seq=shuffle([it.ans, ...shuffle(dIdx).slice(0,nOpt-1)]);
  const t0=now();
  let pos=0, dead=false;
  const record=(correct)=>{
    S.p2.push({w:it.w,b:+it.b.toFixed(2),linked:!!it.linked,correct:correct&&!dead,nOpt:seq.length,seen:pos+1,rt:Math.round(now()-t0)});
    const est=eap1d(S.p2.map(x=>({b:x.b,correct:x.correct,floor:P2_FLOOR,slip:P2_SLIP})), ((S.est._p1quick&&S.est._p1quick.c)||0)-0.5, 0.8);  // 錨を「見た−0.5」に(意味<見たを反映し見た高さへ引き戻されない)
    p2Est.c=est.c; p2Est.se=est.se;
    p2Next();
  };
  const step=()=>{
    if(pos>=seq.length){ record(false); return; }
    const oi=seq[pos];
    scr().innerHTML=`
      <div class="progress"><div style="width:${(answered/pmax*100)}%"></div></div>
      <div class="pcount">${answered+1} / 最大${pmax}</div>
      <div class="stim small">${it.w}</div>
      <p class="lead center">この ことばの意味は……</p>
      <div class="opts" style="max-width:520px;"><div class="opt" style="cursor:default;border-color:var(--main);background:var(--soft);">${it.opts[oi]}</div></div>
      <div class="yn" style="margin-top:20px;"><button class="btn big" id="y">はい、この意味 ${kbd('1')}</button><button class="btn big ghost" id="n">ちがう ${kbd('2')}</button></div>`;
    setKeys(ynKeys('#y','#n'));
    let lk=false;
    const respond=yes=>{
      if(lk)return; lk=true;
      if(yes){ record(oi===it.ans); }
      else{ if(oi===it.ans) dead=true; pos++; step(); }
    };
    $('#y').onclick=()=>respond(true); $('#n').onclick=()=>respond(false);
  };
  step();
}

/* ---------- パート3 本番(想起のみ・1問ごとの適応型) ---------- */
let p3T0=0, p3RecallDone=0, p3aEst={c:0,se:2}, p3Prior=0;
const P3_RECALL_N=30;
function startP3(){
  const cB=p2Est.c;
  const cC=(S.est._p1quick&&S.est._p1quick.c);
  const seed=(typeof cC==='number')?(0.4*cC+0.6*cB):cB;   // セクション1+2の結果から想起の開始点を決める
  p3Prior=seed;                                            // P1+P2の力を事前分布の錨に(序盤1問で暴れないように)
  p3aEst={c:seed-0.3, se:2};
  (S._p3reserve||[]).forEach(x=>x.used=false);
  p3RecallDone=0; p3T0=now();
  p3NextRecall();
}
function p3PickRecall(){
  const cand=(S._p3reserve||[]).filter(x=>!x.used);
  if(!cand.length) return null;
  const t=p3aEst.c+0.2;
  cand.sort((a,b)=>Math.abs(a.b-t)-Math.abs(b.b-t));
  const top=cand.slice(0,Math.min(3,cand.length));
  const it=top[Math.floor(Math.random()*top.length)];
  it.used=true; return it;
}
function p3NextRecall(){
  if(p3RecallDone>=P3_RECALL_N || (now()-p3T0)>16*60*1000){ S.partDur.p3=(now()-p3T0)/1000; finish(); return; }
  const item=p3PickRecall();
  if(!item){ S.partDur.p3=(now()-p3T0)/1000; finish(); return; }
  renderRecall({item, practice:false, idx:p3RecallDone, total:P3_RECALL_N, onDone:(res)=>{
    S.p3.push({type:'recall',answer:item.answer,b:+item.b.toFixed(2),resp:res.value,status:res.status,rt:res.rt});
    const e=eap1d(S.p3.filter(x=>x.type==='recall').map(x=>({b:x.b,correct:x.status==='correct',floor:0})), p3Prior, 1.0);
    p3aEst.c=e.c; p3aEst.se=e.se;          // P1+P2を錨にした適応(正解→難化 / 不正解→易化)
    p3RecallDone++; p3NextRecall();
  }});
}

/* ---------- パート4 本番 ---------- */
let p4Items=[], p4T0=0;
function startP4(){
  p4Items=shuffle(DATA.bank.p4.filter(x=>x.form===S.form));
  p4T0=now();
  p4Next(0);
}
function p4Next(k){

/* ===================== 採点 ===================== */
function finish(){
  guardOn=false;
  scr().innerHTML=`<p class="lead center" style="margin:60px 0;">採点しています…</p>`;
  setTimeout(()=>{
    // C層
    const eC=eapP1(S.p1, 0.5, 1.5);
    // B層(独立prior — 傾き測定のため事前で結びつけない)
    // B層: SMC(floor 0.10)のみ
    const eB=eap1d(S.p2.map(x=>({b:x.b,correct:x.correct,floor:0.10,slip:P2_SLIP})), eC.c, 0.5);  // slip吸収+C層を錨(sd0.5)。Bは下でB≤Cに頭打ち
    // A層: 想起のみ(推測の余地なし)。unmatched/skipは誤答扱い、unmatchedは要レビューとして記録
    const aItems=S.p3.filter(x=>x.type==='recall').map(x=>({b:x.b, correct:x.status==='correct', floor:0}));
    const hasA = aItems.length>0;                          // 短縮版はA(つかいこなせる)を測らない
    const eA = hasA? eap1d(aItems, 0, 1.8) : {c:null, se:null};

    // 順序の生値とクリップ(表示用)。B≤C(意味は露出を超えない)
    const cC = eC.c, cB = Math.min(eB.c, eC.c);
    const cA = hasA? Math.min(eA.c, cB) : null;
    const reversal = hasA ? !(eA.c<=cB+1e-9 && cB<=cC+1e-9) : !(cB<=cC+1e-9);

    const V=(c)=>vocabCount(c);
    const est={
      cC:+eC.c.toFixed(3), seC:+eC.se.toFixed(3), g:+eC.g.toFixed(3),
      cB:+eB.c.toFixed(3), seB:+eB.se.toFixed(3),
      cA: hasA? +eA.c.toFixed(3): null, seA: hasA? +eA.se.toFixed(3): null,
      reversal, short:!!S.short,
      VB:V(cB), VB_lo:V(cB-1.96*eB.se), VB_hi:V(cB+1.96*eB.se),
      VC:V(cC), VC_lo:V(cC-1.96*eC.se), VC_hi:V(cC+1.96*eC.se),
      VA: hasA? V(cA): null, VA_lo: hasA? V(cA-1.96*eA.se): null, VA_hi: hasA? V(cA+1.96*eA.se): null,
      spread1:+(cC-cB).toFixed(3), spread2: hasA? +(cB-cA).toFixed(3): null,
    };
    est.r1=est.VC/Math.max(est.VB,1); est.r2= hasA? est.VB/Math.max(est.VA,1): null;
    // 難語帯(b>0)限定の3層
    const HF=0.0;
    est.hC=vocabCountHard(cC,HF); est.hB=vocabCountHard(cB,HF); est.hA= hasA? vocabCountHard(cA,HF): null;
    est.hr1=est.hC/Math.max(est.hB,1); est.hr2= hasA? est.hB/Math.max(est.hA,1): null;
    est.label = est.spread1>=1.1 ? 'ひろがり型' : (est.spread1<=0.55 ? 'じっくり型' : 'バランス型');
    // 条件付き正答率(リンク項目)
    const p1yes=new Set(S.p1.filter(x=>x.real&&x.resp).map(x=>x.w));
    const linked=S.p2.filter(x=>x.linked&&p1yes.has(x.w));
    est.condBgivenC = linked.length? +(linked.filter(x=>x.correct).length/linked.length).toFixed(3) : null;
    est.condN = linked.length;
    // P4
    const valid=S.p4.filter(x=>!x.timeout&&x.rt>=200);
    const corr=valid.filter(x=>x.correct);
    est.p4={acc: S.p4.length? +(S.p4.filter(x=>x.correct).length/S.p4.length).toFixed(3):null,
            medRT: corr.length? Math.round(median(corr.map(x=>x.rt))) : null,
            baseRT: S.baselineRT?Math.round(S.baselineRT):null,
            adjRT: (corr.length&&S.baselineRT)? Math.round(median(corr.map(x=>x.rt))-S.baselineRT):null,
            timeouts:S.p4.filter(x=>x.timeout).length};
    est.unmatchedRecall=S.p3.filter(x=>x.type==='recall'&&x.status==='unmatched').map(x=>({answer:x.answer,resp:x.resp}));
    // 測定上限(天井)の検知(層別) — 上限超えは「測定不能」として明示する
    const maxB1=Math.max(...DATA.bank.p1_real.map(x=>x.b));
    const maxB2=Math.max(...DATA.bank.p2.map(x=>x.b));
    const maxB3=Math.max(...DATA.bank.p3_recall.map(x=>x.b));
    const servedMaxB2=S.p2.length? Math.max(...S.p2.map(x=>x.b)) : -9;   // 実際に出題した最難
    est.ceilC = (eC.c > maxB1-0.3);
    est.ceilB = (eB.c > maxB2-0.3) || (eB.c > servedMaxB2+0.3);          // 出題が届かず外挿(短縮版で頻発)も上限扱い
    est.ceilA = hasA? (eA.c > maxB3-0.3) : false;
    est.ceiling = est.ceilC || est.ceilB;
    est.lapse=P1_LAPSE; est.fastN=S.p1.filter(x=>x.fast).length;
    S.est=est;
    // 履歴の保存(出題済み項目の記録+前回比)
    const h=loadHist();
    h.used=h.used||{p1:[],ps:[],p2:[],p3r:[],p3d:[]};
    const addU=(k,vals)=>{ h.used[k]=[...new Set([...(h.used[k]||[]),...vals])]; };
    addU('p1', S.p1.filter(x=>x.real).map(x=>x.w));
    addU('ps', S.p1.filter(x=>!x.real).map(x=>x.w));
    addU('p2', S.p2.map(x=>x.w));
    addU('p3r', S.p3.filter(x=>x.type==='recall').map(x=>x.answer));
    addU('p3d', S.p3.filter(x=>x.type==='deep').map(x=>x.stem));
    h.results=h.results||[];
    S.prevResult = h.results.length ? h.results[h.results.length-1] : null;
    // 複数回の重み付き平均(精度の逆数で重み付け)→ 回を重ねるほど締まる総合推定
    const prevs=h.results.filter(r=>typeof r.cB==='number'&&typeof r.seB==='number');
    const allRuns=[...prevs.map(r=>({c:r.cB,se:Math.max(r.seB,0.15)})), {c:est.cB,se:Math.max(est.seB,0.15)}];
    const wsum=allRuns.reduce((s,x)=>s+1/(x.se*x.se),0);
    const cbar=allRuns.reduce((s,x)=>s+x.c/(x.se*x.se),0)/wsum;
    const sebar=Math.sqrt(1/wsum);
    est.cumN=allRuns.length;
    est.VBcum=V(cbar); est.VBcum_lo=V(cbar-1.96*sebar); est.VBcum_hi=V(cbar+1.96*sebar);
    h.results.push({ts:new Date().toISOString(), session:S.meta.session, short:!!S.short,
      VB:Math.round(est.VB), VC:Math.round(est.VC), VA:est.VA!=null?Math.round(est.VA):null, cB:est.cB, seB:est.seB, label:est.label});
    saveHist(h);
    showReport();
  },400);
}

/* ===================== レポート ===================== */
/* 年代別の参考帯(NTT 2018-2020学校調査・令和版16.3万語基準。本テストの台帳とは別尺度) */
const NORMS={
  '小6':   {label:'小6', q1:35040, med:47158, q3:62458},
  '中学生': {label:'中学生(中2基準)', q1:39436, med:51472, q3:66273},
  '大人(18〜39)': {label:'20〜30代', q1:51182, med:63807, q3:77467},
  '大人(40〜59)': {label:'40〜50代', q1:64375, med:76442, q3:87539},
  '大人(60〜)':   {label:'50歳以上(60代以上の学校調査なし)', q1:67574, med:80424, q3:94516},
};
const Phi=z=>{const t=1/(1+0.2316419*Math.abs(z));const d=Math.exp(-z*z/2)/Math.sqrt(2*Math.PI);
  let p=d*t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
  return z>=0?1-p:p;};
function normBlock(){
  const n=NORMS[S.meta.age];
  const own=`本テスト自身のパーセンタイルは、受検データが集まりしだい この欄で正式版に切り替わります。`;
  if(!n) return `<p class="lead" style="font-size:13px;">${own}<br><span style="color:var(--faint);font-size:12px;">あなたの年代(${S.meta.age})の信頼できる公開データは存在しません(小2〜小5・高校生のノルムは本テストが自前で作る領域です)。</span></p>`;
  // 粗い試算: 本テストのC(みたことがある)をNTT 16.3万語基準に比例換算し、対数正規近似で位置づけ
  const xNtt = Math.max(1000, S.est.VC * (163000/DATA.daicho.total));
  const sigma = Math.log(n.q3/n.q1)/1.349;
  const z = (Math.log(xNtt)-Math.log(n.med))/sigma;
  const topPctRaw = (1-Phi(z))*100;
  const topPct = Math.max(1, Math.min(99, Math.round(topPctRaw)));
  const lo=Math.max(1,topPct-8), hi=Math.min(99,topPct+8);
  const pctLabel = topPctRaw<=2.5 ? `上位 1〜3%` : (topPctRaw>=97.5 ? `下位 1〜3%` : `上位 約${topPct}%<span style="font-size:13px;font-weight:400;color:var(--faint)">(およそ ${lo}〜${hi}%)</span>`);
  return `
  <div class="gaps"><div class="gap">
    <div class="g1">同年代(${n.label})の中での位置 — 暫定の試算 ※</div>
    <div class="g2">${pctLabel}</div>
    <div class="g1">同年代の真ん中50%は ${n.q1.toLocaleString()}〜${n.q3.toLocaleString()}語(中央値 ${n.med.toLocaleString()}語・16.3万語基準)</div>
  </div></div>
  <p class="note">※ 別調査(NTT 2018-2020・学校実施・約14,000人・自己申告)への比例換算による粗い試算です。数え方の違い・世代差・回答傾向の影響を含むため、幅をもって見てください。<b>語彙は年齢で自動的に増えるのではなく、読書・経験の積み重ねで増えます。年代との比較より「前回の自分より増えたか」が本質です。</b></p>
  <p class="lead" style="font-size:12px;color:var(--faint);">${own}</p>`;
}
function showReport(){
  const e=S.est;
  const wB=Math.max(8,e.VB/e.VC*100), wA=e.VA? Math.max(6,e.VA/e.VC*100):0;
  const fastFlag = e.g<=0.15 ? '✓ にせ単語チェック: 通過' : '△ にせ単語への反応がやや多め(慎重に解釈)';
  // 「潜在(見た) vs 顕在(意味)」: 見た語のうち意味がわかる割合と、伸びしろ(C−B)
  const pct = e.VC>0 ? Math.min(100, Math.round(e.VB/e.VC*100)) : 0;
  const headroom = Math.max(0, Math.round(e.VC - e.VB));
  const headroomTxt = headroom < e.VC*0.02
    ? '見たことばの意味は、ほぼ把握できています(伸びしろはわずか)'
    : '意味がまだ定着していないことば(伸びしろ)＝ 約 '+fmtN(headroom)+'語 ← 次に増やせる層';
  scr().innerHTML=`
    <div class="tag">RESULT — ことばの力レポート(プロトタイプ)</div>
    <h1 style="margin-bottom:2px;">${S.meta.name} さんの結果</h1>
    <p class="note" style="margin:0 0 18px;">受検日 ${new Date().toLocaleDateString('ja-JP')} / ${S.meta.session}回目 / ${S.meta.age}歳</p>

    <div class="rep-name">いみがわかることば(今回の記録)</div>
    <div class="rep-big">${e.ceilB? fmtN(e.VB)+'<small> 語以上</small>' : '約 '+fmtN(e.VB)+'<small> 語</small>'}</div>
    ${e.ceilB? `<p class="note" style="color:var(--ng);font-weight:700;">⚠ 測定不能域 — あなたの「いみがわかる」は、このテストで測れる上限を超えています。表示は下限値です(問題バンク拡張版で測り直し対象)。</p>`:''}
    <div class="rep-ci">95%のあたり ${fmtN(e.VB_lo)} 〜 ${fmtN(e.VB_hi)}語</div>
    ${S.prevResult? `<p class="note" style="margin-top:8px;">前回(${(S.prevResult.ts||'').slice(5,10).replace('-','/')}・${S.prevResult.session}回目): 約${S.prevResult.VB.toLocaleString()}語 → 今回 ${(Math.round(e.VB)-S.prevResult.VB)>=0?'+':''}${(Math.round(e.VB)-S.prevResult.VB).toLocaleString()}語。<b>差が95%幅の中なら誤差の範囲</b>として見てください。</p>`:''}
    ${e.cumN>=2? `<p class="note">これまでの総合推定(${e.cumN}回の重み付き平均): <b>約 ${fmtN(e.VBcum)}語</b>(${fmtN(e.VBcum_lo)}〜${fmtN(e.VBcum_hi)})— 回数を重ねるほど この幅は締まります。</p>`:''}

    <hr class="secline">
    <div class="tag">${e.VA==null?'ことばの2つの層':'3つの層'}</div>
    <div class="tierrow"><div class="tname">みたことがある<small>見覚えがある</small></div>
      <div><div class="tbar" style="width:100%;background:var(--c);">${e.ceilC? fmtN(e.VC)+'語以上':'約 '+fmtN(e.VC)+'語'}</div></div>
      <div class="tnum">${e.ceilC? '<span class="badge" style="background:var(--ng);color:#fff;">測定上限超え</span>':`<span class="badge est">予測</span> ${fmtN(e.VC_lo)}〜${fmtN(e.VC_hi)}`}</div></div>
    <div class="tierrow"><div class="tname">いみがわかる<small>意味を選べる</small></div>
      <div><div class="tbar" style="width:${wB}%;background:var(--main);">${e.ceilB? fmtN(e.VB)+'語以上':'約 '+fmtN(e.VB)+'語'}</div></div>
      <div class="tnum">${e.ceilB? '<span class="badge" style="background:var(--ng);color:#fff;">測定上限超え</span>':`<span class="badge rec">記録</span> ${fmtN(e.VB_lo)}〜${fmtN(e.VB_hi)}`}</div></div>
    ${e.VA==null ? '' : `<div class="tierrow"><div class="tname">つかいこなせる<small>自力で使える</small></div>
      <div><div class="tbar" style="width:${wA}%;background:var(--a);">${e.ceilA? fmtN(e.VA)+'語以上':'約 '+fmtN(e.VA)+'語'}</div></div>
      <div class="tnum">${e.ceilA? '<span class="badge" style="background:var(--ng);color:#fff;">測定上限超え</span>':`<span class="badge est">予測</span> ${fmtN(e.VA_lo)}〜${fmtN(e.VA_hi)}`}</div></div>`}

    <hr class="secline">
    <div class="tag">見たことば と 意味がわかることば</div>
    <div class="gaps"><div class="gap" style="background:var(--main-weak);">
      <div class="g1">「見たことがある」ことばのうち</div>
      <div class="g2" style="color:var(--main);">${pct}<span style="font-size:14px;font-weight:400;">％ は意味もわかる</span></div>
      <div class="g1">${headroomTxt}</div>
    </div></div>

    ${e.short ? '' : `
    <hr class="secline">
    <div class="tag">ことばのかたち(参考指標・検証中)</div>
    ${(e.ceilC||e.ceilB||e.ceilA)? `<p class="lead" style="font-size:14px;color:var(--ng);"><b>算出不能</b> — 測定上限を超えた層があります。</p>` : `
    <p class="lead" style="font-size:15px;"><b style="color:var(--main);">${e.label}</b></p>
    <div class="gaps">
      <div class="gap"><div class="g1">みた ÷ いみ</div><div class="g2">${e.r1.toFixed(2)}<span style="font-size:11px;">倍</span></div></div>
      <div class="gap"><div class="g1">いみ ÷ つかう</div><div class="g2">${e.r2.toFixed(2)}<span style="font-size:11px;">倍</span></div></div>
    </div>`}
    <p class="note">※「かたち」は検証中の参考指標です(研究の相場 C:B:A ≒ 3:2:1)。</p>`}

    <hr class="secline">
    <div class="quality" style="color:var(--faint);">
      <span>${fastFlag}</span>
      <span>素点 みた ${S.p1.filter(x=>x.real&&x.resp).length}/${S.p1.filter(x=>x.real).length} ・ いみ ${S.p2.filter(x=>x.correct).length}/${S.p2.length}</span>
    </div>

    <div class="center" style="margin-top:26px;">
      <button class="btn" id="b-dl">結果データを保存(JSON)</button>
      <button class="btn ghost" id="b-copy">結果をコピー</button>
      <button class="btn ghost" id="b-redo">最初からやり直す</button>
    </div>
    <p class="note center" id="submit-status" style="margin-top:10px;min-height:18px;"></p>

    <details><summary>開発用の詳細データ</summary><pre id="devjson"></pre></details>
    <p class="note">語彙数は基準リスト(${DATA.daicho.total.toLocaleString()}語)にもとづく推定値です。プロトタイプのため較正前の暫定値です。</p>`;
  const dump={meta:S.meta, form:S.form, mode:S.mode, baselineRT:S.baselineRT, typingMs:S.typingMs,
              partDur:S.partDur, est:S.est, p1:S.p1, p2:S.p2, p3:S.p3, p4:S.p4, bankVersion:DATA.version};
  $('#devjson').textContent=JSON.stringify({est:S.est, partDur:S.partDur, condN:S.est.condN},null,1);
  $('#b-dl').onclick=()=>{
    const blob=new Blob([JSON.stringify(dump,null,1)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`vt_${S.meta.name}_s${S.meta.session}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };
  $('#b-copy').onclick=()=>{
    navigator.clipboard.writeText(JSON.stringify(dump)).then(()=>{ $('#b-copy').textContent='コピーしました ✓'; })
      .catch(()=>{ $('#b-copy').textContent='コピーできませんでした(保存ボタンをお使いください)'; });
  };
  $('#b-redo').onclick=()=>location.reload();
  // 結果の自動送信(SUBMIT_URLが設定されていれば。失敗してもJSON保存ボタンで送れる)
  const sst=$('#submit-status');
  if(SUBMIT_URL){
    if(sst) sst.textContent='結果を送信中…';
    fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({token:SUBMIT_TOKEN,data:dump})})
      .then(()=>{ if(sst){ sst.textContent='✓ 結果を送信しました。ご協力ありがとうございます。'; sst.style.color='var(--ok)'; } })
      .catch(()=>{ if(sst){ sst.textContent='△ 自動送信できませんでした。下の「結果データを保存(JSON)」を押して送ってください。'; sst.style.color='var(--ng)'; } });
  }
  setKeys({});
}

showIntro();
